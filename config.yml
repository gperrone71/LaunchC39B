# config.yml - Configurazioni di pipeline per LaunchC39B
#
# Struttura base (booleano semplice):
#   NomeConfigurazione:
#     NomeScript: true/false
#
# Struttura estesa (con override opzioni):
#   NomeConfigurazione:
#     NomeScript:
#       enabled: true/false
#       opt_override: --opzione1 --opzione2
#
# Opzione a livello di pipeline:
#   use_transl_as_act: true  -> usa il file _transl prodotto da Sgamatore
#                               come file_act per gli script successivi
#
# Campo 'id': identificativo breve per il lancio da CLI (--config <id>)
#   Usare solo lettere, numeri e underscore, senza spazi.

configurations:

  # Solo Sgamatore: fa solo controllo scarichi
  Sgamatore solo controllo scarichi:
    id: sgamatore_scarichi
    Sgamatore: true
    Planning-Intruder: false
    EQA: false
    Workload-Analyzer: false
    
  # Sgamatore e ECOFIN: utile per tradurre il file senza eseguire le analisi.
  Sgamatore, ECOFIN:
    id: sgamatore_ecofin
    Sgamatore: 
        enabled: true
        opt_override: --ecofin
    Planning-Intruder: false
    EQA: false
    Workload-Analyzer: false

  # Sgamatore, ECOFIN e Planning-Intruder: utile per verifiche intermedie sulle pianificazioni
  Sgamatore, ECOFIN e Planning-Intruder:
    id: sgamatore_ecofin_pi
    use_transl_as_act: true
    Sgamatore: 
        enabled: true
        opt_override: --ecofin
    Planning-Intruder: true
    EQA: false
    Workload-Analyzer: false

  # Sgamatore, ECOFIN, Planning-Intruder e EQA
  Sgamatore, ECOFIN, Planning-Intruder, EQA:
    id: sgamatore_ecofin_pi_eqa
    use_transl_as_act: true
    Sgamatore: 
        enabled: true
        opt_override: --ecofin
    Planning-Intruder: true
    EQA: true
    Workload-Analyzer: false
      
  # Pipeline completa: tutti gli script in sequenza.
  # Sgamatore traduce il file e il suo output viene passato agli script successivi.
  Pipeline completa:
    id: pipeline_completa
    use_transl_as_act: true
    Sgamatore: 
        enabled: true
        opt_override: --ecofin
    Planning-Intruder: true
    EQA: true
    Workload-Analyzer: true

  # Pipeline completa con opzioni personalizzate per Sgamatore.
  # opt_override sostituisce completamente script_opt definito in tools.yml.
  Pipeline con override Sgamatore:
    id: pipeline_no_rosetta
    use_transl_as_act: true
    Sgamatore:
      enabled: true
      opt_override: --ecofin --no-rosetta
    Planning-Intruder: true
    EQA: true
    Workload-Analyzer: true
    
  # Analisi senza Sgamatore: gli script lavorano direttamente su file_act originale.
  Analisi su file esistente:
    id: analisi_esistente
    Sgamatore: false
    Planning-Intruder: true
    EQA: true
    Workload-Analyzer: true