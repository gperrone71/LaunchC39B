# config.yml - Configurazioni di pipeline per LaunchC39B
#
# Struttura base (booleano semplice):
#   NomeConfigurazione:
#     NomeScript: true/false
#
# Struttura estesa (con override opzioni):
#   NomeConfigurazione:
#     NomeScript:
#       enabled: true/false
#       opt_override: --opzione1 --opzione2
#
# Opzione a livello di pipeline:
#   use_transl_as_act: true  -> usa il file _transl prodotto da Sgamatore
#                               come file_act per gli script successivi

configurations:

  # Pipeline completa: tutti gli script in sequenza.
  # Sgamatore traduce il file e il suo output viene passato agli script successivi.
  Pipeline completa:
    use_transl_as_act: true
    Sgamatore: true
    Planning-Intruder: true
    EQA: true
    Workload-Analyzer: true

  # Solo Sgamatore: utile per tradurre il file senza eseguire le analisi.
  Solo Sgamatore:
    Sgamatore: true
    Planning-Intruder: false
    EQA: false
    Workload-Analyzer: false

  # Analisi senza Sgamatore: gli script lavorano direttamente su file_act originale.
  Analisi su file esistente:
    Sgamatore: false
    Planning-Intruder: true
    EQA: true
    Workload-Analyzer: true

  # Pipeline completa con opzioni personalizzate per Sgamatore.
  # opt_override sostituisce completamente script_opt definito in tools.yml.
  Pipeline con override Sgamatore:
    use_transl_as_act: true
    Sgamatore:
      enabled: true
      opt_override: --ecofin --no-rosetta
    Planning-Intruder: true
    EQA: true
    Workload-Analyzer: true
